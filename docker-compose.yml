version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: slmp-tech-exam-app
    container_name: slmp-tech-exam-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - '8000:8000'
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: slmp
      DB_USERNAME: slmp
      DB_PASSWORD: secret
    depends_on:
      - db
    command: bash -lc "php artisan migrate --seed && php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    container_name: slmp-tech-exam-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: slmp
      MYSQL_USER: slmp
      MYSQL_PASSWORD: secret
    ports:
      - '3306:3306'
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
